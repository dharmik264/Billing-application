name: billing_application
description: A new Flutter project for billing application with OTP login.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.2.2
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  lottie: ^3.3.3
  pdf: ^3.11.1
  path_provider: ^2.1.4
  open_filex: ^4.4.0
  sqflite: ^2.4.3
  path: ^1.9.1
  connectivity_plus: ^7.1.1
  blue_thermal_printer: ^1.2.3
  esc_pos_utils_plus: ^2.0.4
  sqflite_common_ffi: ^2.4.1
  printing: ^5.14.3
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
